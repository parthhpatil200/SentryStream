

services:

  #################################################
  # KAFKA
  #################################################

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sentrystream-kafka
    hostname: kafka

    networks:
      - sentrystream_network

    ports:
      - "9094:9094"

    expose:
      - "9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      CLUSTER_ID: "SentryStreamKRaftCluster01"

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: unless-stopped


  #################################################
  # POSTGRES
  #################################################

  postgres:

    image: postgres:16

    container_name: sentrystream-postgres

    networks:
      - sentrystream_network

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U sentrystream -d sentrystream_db"]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: unless-stopped


  #################################################
  # REDIS
  #################################################

  redis:

    image: redis:latest

    container_name: sentrystream-redis

    networks:
      - sentrystream_network

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: unless-stopped


  #################################################
  # BACKEND
  #################################################

  backend:

    build:
      context: ./backend

    container_name: sentrystream-backend

    networks:
      - sentrystream_network

    ports:
      - "5000:5000"

    environment:

      SENTRYSTREAM_PGHOST: postgres
      SENTRYSTREAM_PGPORT: 5432
      SENTRYSTREAM_PGDATABASE: ${POSTGRES_DB}
      SENTRYSTREAM_PGUSER: ${POSTGRES_USER}
      SENTRYSTREAM_PGPASSWORD: ${POSTGRES_PASSWORD}

      SENTRYSTREAM_REDIS_HOST: redis
      SENTRYSTREAM_REDIS_PORT: 6379

    depends_on:

      kafka:
        condition: service_healthy

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    restart: unless-stopped


  #################################################
  # ML WORKER
  #################################################

  ml_worker:

    build:
      context: ./ml_worker

    container_name: sentrystream-ml-worker

    networks:
      - sentrystream_network

    environment:

      SENTRYSTREAM_KAFKA_BROKER: kafka:9092

      SENTRYSTREAM_PGHOST: postgres
      SENTRYSTREAM_PGPORT: 5432
      SENTRYSTREAM_PGDATABASE: sentrystream_db
      SENTRYSTREAM_PGUSER: sentrystream
      SENTRYSTREAM_PGPASSWORD: SentryStreamPass123

      SENTRYSTREAM_REDIS_HOST: redis
      SENTRYSTREAM_REDIS_PORT: 6379

    depends_on:

      kafka:
        condition: service_healthy

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    restart: unless-stopped


  #################################################
  # FRONTEND
  #################################################

  frontend:

    build:
      context: ./frontend

    container_name: sentrystream-frontend

    networks:
      - sentrystream_network

    ports:
      - "4173:4173"

    depends_on:

      backend:
        condition: service_started

    restart: unless-stopped


#################################################
# NETWORKS
#################################################

networks:

  sentrystream_network:
    driver: bridge


#################################################
# VOLUMES
#################################################

volumes:

  postgres_data: